<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protected Page</title>
    <style>
        body { font-family: sans-serif; background: #23272a; color: white; text-align: center; padding: 50px; }
        .hidden { display: none; }
        .btn { background: #5865F2; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>🔒 This page requires a specific Discord Role</h2>
        <p>Please log in with Discord to verify your access.</p>
        <button class="btn" onclick="redirectToDiscord()">Log In with Discord</button>
    </div>

    <div id="secret-content" class="hidden">
        <h1>Welcome to the Secret Page!</h1>
        <p>This content is only visible to users with the verified role.</p>
    </div>

    <script>
        // CONFIGURATION
        const CLIENT_ID = '1509651961421631538';
        const REDIRECT_URI = 'https://usmejode.github.io/profollowo/Secretpage.html';
        const GUILD_ID = '1244658152289337354';
        const REQUIRED_ROLE_ID = '1509653720068128778';

        function redirectToDiscord() {
            const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify%20guilds%20guilds.members.read`;
            window.location.href = url;
        }

        async function checkAccess() {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const accessToken = fragment.get('access_token');

            if (!accessToken) return; // User hasn't logged in yet

            // Hide login, show a loading status if you want
            document.getElementById('login-screen').innerHTML = "<h2>Verifying roles...</h2>";

            try {
                // Fetch user's member data for your specific server
                const response = await fetch(`https://discord.com/api/users/@me/guilds/${GUILD_ID}/member`, {
                    headers: { Authorization: `Bearer ${accessToken}` }
                });

                if (!response.ok) {
                    throw new Error("Not a member of the server or verification failed.");
                }

                const memberData = await response.json();
                
                // Check if user has the required role
                if (memberData.roles.includes(REQUIRED_ROLE_ID)) {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('secret-content').classList.remove('hidden');
                    // Clean up URL token
                    window.history.pushState({}, document.title, window.location.pathname);
                } else {
                    document.getElementById('login-screen').innerHTML = "<h2>❌ Access Denied</h2><p>You do not have the required Discord role to view this page.</p>";
                }

            } catch (error) {
                console.error(error);
                document.getElementById('login-screen').innerHTML = "<h2>❌ Error</h2><p>Could not verify your Discord account. Make sure you are in the server.</p>";
            }
        }

        // Run check on page load
        window.onload = checkAccess;
    </script>
</body>
</html>
